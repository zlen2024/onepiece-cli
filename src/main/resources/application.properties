# Quarkus Configuration
quarkus.application.name=onepiece-cli
quarkus.application.version=1.0.0

# Picocli Configuration
quarkus.picocli.native-image.processing.enable=true

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n

# LangChain4j Configuration
# ----------------------------------------------------------------------------
# AI Provider configuration is now managed through the settings menu.
# Run 'onepiece settings' to configure your AI provider (OpenAI, OpenRouter, or Custom).
#
# Configuration is stored in ~/.onepiece/config.json
#
# Legacy environment variable support (optional):
#   OPENAI_API_KEY - Will be used as fallback if no provider is configured
# ----------------------------------------------------------------------------
# Disable automatic OpenAI configuration - we use dynamic configuration instead
# Using a placeholder value to prevent validation errors when API key is not configured
# Users should configure their AI provider through the settings menu
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:sk-placeholder-configure-via-settings-menu}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4
quarkus.langchain4j.openai.chat-model.temperature=0.7
quarkus.langchain4j.openai.chat-model.max-tokens=2000
quarkus.langchain4j.openai.timeout=60s

# Native Image Configuration
quarkus.native.additional-build-args=\
  --initialize-at-run-time=org.jline.terminal.impl.AbstractWindowsTerminal,\
  --initialize-at-run-time=org.jline.terminal.impl.PosixSysTerminal,\
  --initialize-at-run-time=org.fusesource.jansi.internal.Kernel32,\
  -H:+ReportExceptionStackTraces

# REST Client Configuration
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=1024

# Application Settings
onepiece.vault.default-url=https://vault.example.com
onepiece.config.home=${user.home}/.onepiece
onepiece.deployment.timeout=300
onepiece.ai.generation.timeout=60

